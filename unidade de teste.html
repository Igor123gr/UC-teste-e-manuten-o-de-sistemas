<html>

<head>
    <title>Calculadora</title>

</head>

<body>
    <input id="num1" type="number">
    <input id="num2" type="number">
    <button onclick="Clicarsomar()">Somar</button>
    <button onclick="Clicarsubtrair()">Subtrair</button>
    <button onclick="Clicardividir()">Dividir</button>
    <button onclick="Clicarmultiplicacão()">Multiplicação</button>
    <button onclick="testetodasasfunções()">Botão pra testar todas as funções</button>
    <button onclick="porgentagem()">porgentagem</button>
    <p id="resultado"></p>
    <button onclick="tutorial()" >Clique para ver um tutorial de como a porgentgem funciona</button>
    <div id="tutpor"></div>
    <button onclick="sairtut()">Sair do tutorial</button>
    <p id="resultado"></p>
</body>
<script>


    function somar(n1, n2) {
        return n1 + n2
    }
    function subtrair(n1, n2) {
        return n1 - n2
    }
    function dividir(n1, n2) {
        console.log(n1/n2)
        return (n1 / n2)

    }
    function multiplicacão(n1, n2) {
        return (n1 * n2)
    }
    function por(n1, n2){
        let porcento = n2 / 100
        return (n1 * porcento)
    }



    function Clicarsomar() {
        let n1 = 10
        n1 = Number(document.getElementById("num1").value);
        let n2 = 10
        n2 = Number(document.getElementById("num2").value);
        let men = somar(n1, n2);


        ///////tirei o NaN para testar só a função somar//////// 
        document.getElementById("resultado").textContent =
            "Resultado: " + men;
    }

    function testesomar() {
        somar(10, 10)
        if (somar(10, 10) !== 20) {
            alert("função somar falhou")
            console.log("1")
        }
        else {
            alert("somar funcionando")
        }

    }

    function Clicarsubtrair() {
        let n1 = 12
        n1 = document.getElementById("num1").value
        let n2 = -8
        n2 = document.getElementById("num2").value

        document.getElementById("resultado").textContent =
            "Resultado: " + (n1 - (n2));

    }


    function testesubtrair() {
        subtrair(12, -8)
        if (subtrair(12, -8) !== 20) {
            alert("função subtrair falhou")
            console.log("2")
        }
        else {
            alert("subtrair funcionando")
        }

    }
    function Clicardividir() {
        let n1 = 40
        n1 = Number(document.getElementById("num1").value)
        let n2 = 2
        n2 = Number(document.getElementById("num2").value)

        document.getElementById("resultado").textContent = "Resultado: " + (n1 / n2)

        if (n2 == 0) {
            document.getElementById("resultado").textContent =
                "Não pode divisão por zero amigo";
        }
    }

    function testedividir() {
        dividir(40, 2)
        if (dividir(40, 2) != 20) {
            alert("função dividir falhou")
            console.log("3")
        }
        else {
            alert("dividir fumcionando")
        }

    }
    function Clicarmultiplicacão() {
        let n1 = 10
        n1 = Number(document.getElementById("num1").value)
        let n2 = 2
        n2 = Number(document.getElementById("num2").value) 

        document.getElementById("resultado").textContent = "Resultado: " + (n1 * n2)

    }
    function testemultiplicacão() {
        multiplicacão(10, 2)
        if (multiplicacão(10, 2) != 20) {
            alert("função multiplicar falhou")
            console.log("4")
        }
        else {
            alert("multiplicar funciona")
        }
    }

    function porgentagem() {
        let n1 = 100 
        n1 = Number(document.getElementById("num1").value);
        let n2 = 20  
        n2 = Number(document.getElementById("num2").value);
        let porcent = n2 / 100
        console.log(porcent)

        document.getElementById("resultado").textContent = "Resultado: " + (n1 * porcent)
    }

         function tutorial() {
        document.getElementById("tutpor").textContent = "Bom dia, senhor ou senhora, a porcentagem funciona assim, o primeiro número que você digita, é a sua base, e o seu segundo número é quantos porcento, você quer daquela base, tenha um bom dia, e que Deus te abençoe."
    }

    function sairtut() {
        document.getElementById("tutpor").textContent = ""
    }
    function tespor() {
        por(100, 20)
        if (por(100, 20) != 20) {
            alert("função porcentagem falhou")
            console.log("5")
        }
        else {
            alert("porcentagem funciona")
        }
    }

    function testetodasasfunções() {
        tespor()
        testesomar()
        testesubtrair()
        testedividir()
        testemultiplicacão()
    }

   


</script>

</html>

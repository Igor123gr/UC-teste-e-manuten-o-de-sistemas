<html>

<head>
    <title>Calculadora</title>

</head>

<body>
    <input id="num1" type="number">
    <input id="num2" type="number">
    <button onclick="Clicarsomar()">Somar</button>
    <button onclick="Clicarsubtrair()">Subtrair</button>
    <button onclick="Clicardividir()">Dividir</button>
    <button onclick="Clicarmultiplicacão()">Multiplicação</button>
    <button onclick="testetodasasfunções()">Botão pra testar todas as funções</button>
    <p id="resultado"></p>
</body>
<script>


    function somar(n1, n2) {
        return n1 + n2
    }
    function subtrair(n1, n2) {
        return n1 - n2
    }
    function dividir(n1, n2) {
        console.log(n1/n2)
        return (n1 / n2)

    }
    function multiplicacão(n1, n2) {
        return (n1 * n2)
    }



    function Clicarsomar() {
        let n1 = 10
        n1 = Number(document.getElementById("num1").value);
        let n2 = 10
        n2 = Number(document.getElementById("num2").value);
        let men = somar(n1, n2);


        ///////tirei o NaN para testar só a função somar//////// 
        document.getElementById("resultado").textContent =
            "Resultado: " + men;
    }

    function testesomar() {
        somar(10, 10)
        if (somar(10, 10) !== 20) {
            alert("função somar falhou")
        }
        else {
            alert("somar funcionando")
        }

    }

    function Clicarsubtrair() {
        let n1 = 12
        n1 = document.getElementById("num1").value
        let n2 = -8
        n2 = document.getElementById("num2").value

        document.getElementById("resultado").textContent =
            "Resultado: " + (n1 - (n2));

    }


    function testesubtrair() {
        subtrair(12, -8)
        if (subtrair(12, -8) !== 20) {
            alert("função subtrair falhou")
        }
        else {
            alert("subtrair funcionando")
        }

    }
    function Clicardividir() {
        let n1 = 40
        n1 = Number(document.getElementById("num1").value)
        let n2 = 2
        n2 = Number(document.getElementById("num2").value)

        document.getElementById("resultado").textContent = "Resultado: " + (n1 / n2)

        if (n2 == 0) {
            document.getElementById("resultado").textContent =
                "Não pode divisão por zero amigo";
        }
    }

    function testedividir() {
        dividir(40, 2)
        if (dividir(40, 2) != 20) {
            alert("função dividir falhou")
        }
        else {
            alert("dividir fumcionando")
        }

    }
    function Clicarmultiplicacão() {
        let n1 = 10
        n1 = Number(document.getElementById("num1").value)
        let n2 = 2
        n2 = Number(document.getElementById("num2").value) 

        document.getElementById("resultado").textContent = "Resultado: " + (n1 * n2)

    }
    function testemultiplicacão() {
        multiplicacão(10, 2)
        if (multiplicacão(10, 2) != 20) {
            alert("função multiplicar falhou")
        }
        else {
            alert("multiplicar funciona")
        }
    }
    function testetodasasfunções() {
        testesomar()
        testesubtrair()
        testedividir()
        testemultiplicacão()
    }

</script>

</html>
